# theme
include scheme/tokyonight.conf
# font_family      FiraCode
# font_family      Iosevka NF
# font_family      CodeNewRoman Nerd Font
# font_family      JetBrains Mono
# bold_font        auto
# italic_font      auto
# bold_italic_font auto

font_family      JetBrains Mono Regular Nerd Font Complete Mono
bold_font        JetBrains Mono Bold Nerd Font Complete Mono
italic_font      JetBrains Mono Italic Nerd Font Complete Mono
bold_italic_font JetBrains Mono Bold Italic Nerd Font Complete Mono

font_size 15.0

window_border_width 0
window_margin_width 0.0
# active_border_color #00ff00

#: The color for the border of the active window. Set this to none to
#: not draw borders around the active window.

# inactive_border_color #cccccc
# cursor_text_color background
cursor #8c6476
cursor_stop_blinking_after 9.0

url_color #0087bd
url_style curly


#: The program with which to open URLs that are clicked on. The
#: special value default means to use the operating system's default
open_url_modifiers kitty_mod
open_url_with default



inactive_text_alpha 0.5
#: Fade the text in inactive windows by the specified amount (a number
#: between zero and one, with zero being fully faded).


# shell .
editor nvim


# Keys
map ctrl+shift+v   		paste_from_clipboard
map ctrl+shift+s        	paste_from_selection
map ctrl+shift+c        	copy_to_clipboard
map shift+insert	        paste_from_selection
map ctrl+shift+equal    	change_font_size all +1.0
map ctrl+shift+minus    	change_font_size all -1.0

# default Color scheme

# foreground #f0fdff
# background #2a2e38

# #: black
# color0 #2a2e38
# color8 #71798a

# #: red
# color1  #d08785
# color9 #ff3334

# #: green
# color2  #6f98b3
# color10 #9ec400

# #: yellow

# color3  #fdf8ce
# color11 #e7c547

# #: blue

# color4  #a6b8cc
# color12 #7aa6da

# #: magenta

# color5  #fcdbd9
# color13 #b77ee0

# #: cyan

# color6  #ffd17f
# color14 #54ced6

# #: white

# color7  #f0fdff
# color15 #ffffff

